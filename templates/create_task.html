{% extends "base.html" %}

{% block title %}Создать задачу{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-plus-circle me-2"></i>Создание новой задачи</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Заголовок *</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="project_id" class="form-label">Проект *</label>
                            <select class="form-select" id="project_id" name="project_id" required>
                                <option value="">Выберите проект...</option>
                                {% for project in projects %}
                                <option value="{{ project.project_id }}">{{ project.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="assignee_id" class="form-label">Исполнитель</label>
                            <select class="form-select" id="assignee_id" name="assignee_id">
                                <option value="">Не назначать</option>
                                {% for user in users %}
                                <option value="{{ user.user_id }}">{{ user.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="due_date" class="form-label">Срок выполнения</label>
                            <input type="date" class="form-control" id="due_date" name="due_date">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="estimated_hours" class="form-label">Оценка (часы)</label>
                            <input type="number" step="0.5" class="form-control" id="estimated_hours" name="estimated_hours">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="priority_id" class="form-label">Приоритет</label>
                        <select class="form-select" id="priority_id" name="priority_id">
                            {% for priority in priorities %}
                            <option value="{{ priority.priority_id }}"
                                    style="background-color: {{ priority.color }}20">
                                {{ priority.priority_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('tasks') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Отмена
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-2"></i>Создать задачу
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
