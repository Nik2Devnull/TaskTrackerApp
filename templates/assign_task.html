{% extends "base.html" %}

{% block title %}Назначить исполнителя{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4><i class="fas fa-user-plus me-2"></i>Назначение исполнителя</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="task_id" class="form-label">Задача</label>
                        <select class="form-select" id="task_id" name="task_id" required>
                            <option value="">Выберите задачу...</option>
                            {% for task in tasks %}
                            <option value="{{ task.task_id }}">
                                [{{ task.project_name }}] {{ task.title }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="assignee_id" class="form-label">Исполнитель</label>
                        <select class="form-select" id="assignee_id" name="assignee_id" required>
                            <option value="">Выберите сотрудника...</option>
                            {% for user in users %}
                            <option value="{{ user.user_id }}">{{ user.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('tasks') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Назад
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check me-2"></i>Назначить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% if tasks|length == 0 %}
<div class="row mt-3">
    <div class="col-12">
        <div class="alert alert-success text-center">
            <i class="fas fa-check-circle me-2"></i>Все задачи уже имеют исполнителей!
        </div>
    </div>
</div>
{% endif %}
{% endblock %}
