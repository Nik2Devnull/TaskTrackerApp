{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h3><i class="fas fa-sign-in-alt me-2"></i>Вход в систему</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="xxx@company.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required
                               placeholder="ivanov123">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-arrow-right me-2"></i>Войти
                    </button>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>Если забыли логин или пароль обратитесь к администратору</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
